server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # DNS embutido do Docker. Resolver dinamicamente (via variável no proxy_pass)
  # evita o crash "host not found in upstream" quando o backend ainda não subiu.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Proxy da API REST para o backend
  location /api/ {
    set $upstream http://backend:4000;
    proxy_pass $upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy do Bull Board (iframe) para o backend
  location /admin/ {
    set $upstream_admin http://backend:4000;
    proxy_pass $upstream_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
