services:
  backend:
    build:
      context: ./backend
    container_name: orquestrador-backend
    restart: always
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_PATH: /app/data/orquestrador.sqlite
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
      STATS_CACHE_TTL_MS: 5000
      BULL_BOARD_BASE_PATH: /admin/queues
    volumes:
      - sqlite-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: orquestrador-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # Porta externa 8010 → interna 80 (nginx serve a SPA e faz proxy de /api e /admin)
      - "8010:80"

volumes:
  sqlite-data:
    driver: local
